name: chromatic
description: >-
  Color science for Dart: conversions between sRGB, Lab, XYZ, LCH, HSL and more.
  Delta E, chromatic adaptation, proper sRGB EOTF.
version: 0.1.4
repository: https://github.com/Enraio/chromatic
issue_tracker: https://github.com/Enraio/chromatic/issues
homepage: https://enraio.github.io/chromatic/
documentation: https://pub.dev/documentation/chromatic/latest/
topics:
  - color
  - color-science
  - delta-e
  - accessibility
  - graphics

environment:
  sdk: ^3.11.4

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
