name: chromatic
description: >-
  A comprehensive color science library for Dart. Color space conversions,
  perceptual color difference (Delta E), chromatic adaptation, and more.
  Port of Python's colormath with identical math.
version: 0.1.0
repository: https://github.com/Enraio/chromatic
issue_tracker: https://github.com/Enraio/chromatic/issues
homepage: https://github.com/Enraio/chromatic
topics:
  - color
  - color-science
  - delta-e
  - accessibility
  - graphics

environment:
  sdk: ^3.11.4

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
